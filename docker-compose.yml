version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./products:/app/products

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
