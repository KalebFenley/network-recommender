notes: >
  Modular universal spine switch available in 4-, 8-, and 12-slot chassis
  configurations supporting up to 288x 400G or 576x 100G ports. The R3K
  line cards deliver up to 5M IPv4 routes using the FlexRoute engine.
  Deep-buffer VOQ architecture with 16GB HBM2 per line card eliminates
  head-of-line blocking. Designed for internet core, large-scale DCI,
  and hyperscale data center spine deployments.

