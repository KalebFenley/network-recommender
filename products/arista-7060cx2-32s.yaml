notes: >
  1RU fixed-configuration leaf/spine switch with 32x 100G QSFP28 ports.
  Each port supports flexible breakout to 25G, 10G, 40G, or 50G modes
  simultaneously without restrictions. Successor to the 7060CX with a
  40% larger 22MB shared packet buffer and native IEEE 802.3by 25G
  support with RS-FEC on all ports. Sub-450ns cut-through latency makes
  it ideal for top-of-rack and fixed-spine deployments.

