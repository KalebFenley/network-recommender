notes: >
  1RU high-density aggregation switch with 48x 1/10/25G SFP28 ports
  (backward compatible with 10G SFP+ fiber optics) and 6x 40/100G QSFP28
  uplinks. 1.8 Tbps one-way switching capacity with 40 MB on-chip buffer.
  Supports VXLAN/EVPN, wire-rate MACsec, PTP/SyncE, and rich telemetry.
  Operates in both NX-OS standalone and Cisco ACI fabric modes. Well-suited
  for high-density 10G fiber aggregation with a strong 100G uplink story.

