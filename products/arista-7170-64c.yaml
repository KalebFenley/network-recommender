notes: >
  2RU P4-programmable switch based on the Intel Tofino ASIC with 64x 100G
  QSFP100 ports. The fully programmable data plane allows user-selectable
  EOS forwarding profiles, enabling the switch to be reconfigured at runtime
  for roles such as standard L2/L3 forwarding, large-scale tunnel
  termination, line-rate NAT, INT telemetry, or load balancing without
  hardware changes. Under 5W per 100G port makes it exceptionally power
  efficient. Approximately 800ns latency.

