notes: >
  Compact 1RU aggregation switch with 32x native 10G SFP/SFP+ fiber ports
  supporting 10GBASE-SR/LR/LRM/ER optics, plus optional 2x 40G QSFP+
  uplink expansion modules. Wire-speed 480 Gbps switching capacity with
  full L2/L3 feature set including MPLS, EVPN, VXLAN, MACsec, and PTP.
  Supports Virtual Chassis for stacking up to 10 units into a single
  logical device. Purpose-built for fiber-only 10G aggregation without
  copper or breakout dependencies.

