notes: >
  Compact 1RU aggregation switch with 24x native 10G SFP+ fiber ports and
  2x 100G QSFP uplinks. Features a large 3GB shared packet buffer — unusually
  deep for its class — making it well suited for aggregation roles where
  traffic bursts need absorption. Wire-speed 880 Gbps switching, 300 Mpps
  forwarding, and full EOS feature set including VXLAN, EVPN, and LANZ.

