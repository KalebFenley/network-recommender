notes: >
  1RU high-density aggregation switch with 48x native 10G SFP+ fiber ports
  and 4x 40G QSFP+ uplinks. Delivers 1.28 Tbps non-blocking switching at
  550ns cut-through latency with a 12MB shared packet buffer. Supports
  full L2/L3 forwarding, VXLAN, EVPN, MLAG, LANZ microburst detection,
  and sFlow. Ideal for 10G fiber aggregation tiers without breakout cables.

