notes: >
  Arista's flagship modular universal spine available in 4-, 8-, 12-, and
  16-slot chassis configurations. Supports up to 576x wire-speed 400G ports
  or 768x 100G ports with deep-buffer VOQ architecture and 8GB of packet
  memory to eliminate head-of-line blocking. The FlexRoute engine scales
  to internet-routing-table-plus capacity. Features include EVPN-VXLAN,
  MPLS, Segment Routing, TunnelSec Layer 2/3 encryption, Algorithmic ACLs,
  and inband network telemetry. Suited for hyperscale data center cores
  and large-scale internet exchange/peering deployments.

