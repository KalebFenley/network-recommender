notes: >
  1RU high-density aggregation switch with 48x native 10G SFP+ ports (24 of
  which are unified ports supporting FCoE and native Fibre Channel) and 6x
  40G QSFP+ uplinks. Delivers 1.44 Tbps switching at ~1 microsecond latency.
  Supports VXLAN bridging/routing, EVPN, FCoE, FEX fabric extension, vPC,
  and Cisco Nexus Data Broker telemetry. L3 routing requires the optional
  Layer 3 daughter card. Strong fit for converged SAN/LAN 10G aggregation.

