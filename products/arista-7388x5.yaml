notes: >
  4RU compact modular system with 8 I/O module slots supporting up to
  64x 400G (OSFP/QSFP-DD), 128x 200G, or 256x 100G ports. Built on a
  25.6 Tbps packet processor with 114MB fully shared packet buffer and
  825ns cut-through latency. Supports VXLAN/EVPN, MPLS LSR, ECMP,
  LANZ microburst detection, and sFlow/IPFIX. Positioned as a
  high-density spine for large-scale multi-tier data center fabrics
  where 400G density is needed in a compact modular form factor.

