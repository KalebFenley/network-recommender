notes: >
  1RU high-density aggregation switch with 48x native 1/10G SFP+ fiber ports
  and 6x 40G QSFP+ uplinks. Delivers 1.44 Tbps non-blocking switching at
  sub-microsecond latency. Supports hardware-based MACsec, MPLS L3 VPN,
  VXLAN/EVPN, Virtual Chassis stacking (up to 10 units), and rich automation
  via Python, Ansible, and OpenConfig. Purpose-built for fiber 10G aggregation
  without breakout cables.

