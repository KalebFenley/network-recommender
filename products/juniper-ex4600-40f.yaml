notes: >
  Compact 1RU aggregation switch with 24x native 10G SFP+ fiber ports and
  4x 40G QSFP+ uplinks, plus 2 expansion slots for up to 8 additional SFP+
  or 4 additional QSFP+ ports. 1.44 Tbps switching capacity at 1.07 Bpps.
  Supports hardware MACsec, MPLS L3 VPN, VXLAN/EVPN, and Virtual Chassis
  stacking. Flexible forwarding table with 128k LPM routes and 128k host
  entries. Strong fit for 24-port fiber 10G aggregation tiers.

